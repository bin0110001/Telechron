name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Telechron.slnx

      - name: Build
        run: dotnet build Telechron.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Telechron.slnx --no-build --configuration Release --logger "trx"

      - name: File-length lint (R-ENG1, advisory)
        shell: pwsh
        run: ./scripts/Check-FileLength.ps1
